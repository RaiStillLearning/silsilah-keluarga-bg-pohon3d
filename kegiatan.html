<!DOCTYPE html>
<html lang="en">
<head>
    <script src="security.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="data_manager.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kegiatan - Keluarga Besar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --primary-color: #2e7d32; }
        body { font-family: 'Inter', sans-serif; background: #f0f2f5; color: #333; }
        .hero-section { 
            background: linear-gradient(rgba(46, 125, 50, 0.8), rgba(27, 94, 32, 0.9)), url('/assets/login-bg.jpg'); 
            background-size: cover; background-position: center;
            color: white; padding: 80px 0; margin-bottom: 40px; 
        }
        .section-title { position: relative; padding-bottom: 10px; margin-bottom: 25px; font-weight: 700; }
        .section-title::after {
            content: ''; position: absolute; left: 0; bottom: 0; width: 50px; height: 4px;
            background: var(--primary-color); border-radius: 2px;
        }
        .list-group-item {
            border: none; padding: 20px; margin-bottom: 10px; border-radius: 15px !important;
            background: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            display: flex; align-items: center; justify-content: space-between;
        }
        .icon-box {
            width: 50px; height: 50px; background: rgba(46, 125, 50, 0.1);
            color: var(--primary-color); border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; margin-right: 15px;
        }
        .admin-controls { display: none; }
        .delete-btn { color: #dc3545; cursor: pointer; padding: 5px 10px; }
    </style>
</head>
<body>
    <header class="hero-section text-center">
        <div class="container">
            <h1 class="display-4 fw-bold mb-2">📅 Kegiatan Keluarga</h1>
            <p class="lead opacity-75">Momen kebersamaan yang tak terlupakan</p>
            <div class="d-flex justify-content-center gap-2 mt-4">
                <a href="#" onclick="navTo('Lw=='); return false;" class="btn btn-outline-light rounded-pill px-4">← Beranda</a>
                <button id="addBtn" class="btn btn-light rounded-pill px-4 admin-controls" data-bs-toggle="modal" data-bs-target="#addModal">
                    <i class="bi bi-plus-lg me-1"></i> Tambah Kegiatan
                </button>
                <a href="#" class="btn btn-outline-danger rounded-pill px-4 ms-2" onclick="logoutFamily()">
                    <i class="bi bi-box-arrow-left me-1"></i> Logout
                </a>
            </div>
        </div>
    </header>

    <main class="container mb-5">
        <div class="row g-4">
            <div class="col-md-6">
                <h4 class="section-title">Kegiatan Mendatang</h4>
                <div id="upcomingList" class="list-group">
                    <div class="text-center py-4"><div class="spinner-border text-success" role="status"></div></div>
                </div>
            </div>
            <div class="col-md-6">
                <h4 class="section-title text-muted">Riwayat Kegiatan</h4>
                <div id="historyList" class="list-group">
                    <div class="text-center py-4"><div class="spinner-border text-muted" role="status"></div></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Form -->
    <div class="modal fade" id="addModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow" style="border-radius: 20px;">
                <div class="modal-header border-0 pb-0">
                    <h5 class="fw-bold">Tambah Kegiatan Baru</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="kegiatanForm">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Nama Kegiatan</label>
                            <input type="text" id="title" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Tanggal</label>
                            <input type="date" id="date" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Lokasi</label>
                            <input type="text" id="location" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Tipe</label>
                            <select id="type" class="form-select">
                                <option value="upcoming">Mendatang</option>
                                <option value="history">Riwayat</option>
                            </select>
                        </div>
                        <button type="submit" id="saveBtn" class="btn btn-success w-100 py-3 fw-bold" style="border-radius: 12px;">Simpan Data</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        if (window.isAdmin()) {
            document.querySelectorAll('.admin-controls').forEach(el => el.style.display = 'block');
        }

        async function renderData() {
            const data = await DataManager.getAllData(DataManager.TABLES.KEGIATAN);
            const upcomingList = document.getElementById('upcomingList');
            const historyList = document.getElementById('historyList');
            
            upcomingList.innerHTML = '';
            historyList.innerHTML = '';

            if (data.length === 0) {
                upcomingList.innerHTML = '<p class="text-center text-muted">Belum ada kegiatan.</p>';
                historyList.innerHTML = '<p class="text-center text-muted">Belum ada riwayat.</p>';
                return;
            }

            data.forEach(item => {
                const html = `
                    <div class="list-group-item">
                        <div class="d-flex align-items-center">
                            <div class="icon-box"><i class="bi ${item.type === 'upcoming' ? 'bi-calendar-event' : 'bi-check-circle'}"></i></div>
                            <div>
                                <h6 class="mb-1 fw-bold">${item.title}</h6>
                                <p class="text-muted small mb-0">${item.date} • ${item.location}</p>
                            </div>
                        </div>
                        ${window.isAdmin() ? `<i class="bi bi-trash delete-btn" onclick="deleteItem(${item.id})"></i>` : ''}
                    </div>
                `;
                if (item.type === 'upcoming') upcomingList.innerHTML += html;
                else historyList.innerHTML += html;
            });
        }

        document.getElementById('kegiatanForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Menyimpan...';

            const newItem = {
                title: document.getElementById('title').value,
                date: document.getElementById('date').value,
                location: document.getElementById('location').value,
                type: document.getElementById('type').value
            };
            
            await DataManager.addItem(DataManager.TABLES.KEGIATAN, newItem);
            
            bootstrap.Modal.getInstance(document.getElementById('addModal')).hide();
            saveBtn.disabled = false;
            saveBtn.innerHTML = 'Simpan Data';
            this.reset();
            renderData();
        });

        window.deleteItem = async function(id) {
            if (confirm('Hapus kegiatan ini dari database permanen?')) {
                await DataManager.deleteItem(DataManager.TABLES.KEGIATAN, id);
                renderData();
            }
        }

        renderData();
    </script>
</body>
</html>
