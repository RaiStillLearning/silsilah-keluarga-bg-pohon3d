<!DOCTYPE html>
<html lang="en">
<head>
    <script src="security.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="data_manager.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontak Pengurus - Keluarga Besar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --primary: #2e7d32; }
        body { font-family: 'Inter', sans-serif; background: #f8f9fa; color: #333; }
        .hero-section { 
            background: linear-gradient(rgba(46, 125, 50, 0.9), rgba(27, 94, 32, 0.95)), url('assets/login-bg.jpg'); 
            background-size: cover; background-position: center;
            color: white; padding: 70px 0; text-align: center;
        }
        .contact-card {
            background: white; border-radius: 24px; padding: 30px;
            border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            display: flex; align-items: center; margin-bottom: 20px;
            position: relative;
        }
        .contact-avatar {
            width: 60px; height: 60px; border-radius: 18px;
            background: #e8f5e9; color: var(--primary);
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; margin-right: 20px;
        }
        .contact-info h6 { margin: 0; font-weight: 700; color: #333; }
        .contact-info p { margin: 0; font-size: 0.85rem; color: #777; }
        .btn-call {
            margin-left: auto; width: 40px; height: 40px; border-radius: 12px;
            background: #f0f7f0; color: var(--primary);
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; transition: all 0.2s;
        }
        .btn-call:hover { background: var(--primary); color: white; }
        .admin-controls { display: none; }
        .delete-btn { color: #dc3545; cursor: pointer; margin-left: 15px; display: none; }
    </style>
</head>
<body>
    <header class="hero-section">
        <div class="container">
            <h1 class="display-5 fw-bold mb-2">📞 Kontak Pengurus</h1>
            <p class="lead opacity-75">Hubungi kami untuk informasi seputar kegiatan keluarga</p>
            <div class="d-flex justify-content-center gap-2 mt-4">
                <a href="/home" class="btn btn-outline-light rounded-pill px-4">← Beranda</a>
                <button class="btn btn-light rounded-pill px-4 admin-controls" data-bs-toggle="modal" data-bs-target="#addModal">
                    <i class="bi bi-plus-lg me-1"></i> Tambah Kontak
                </button>
                <a href="#" class="btn btn-outline-danger rounded-pill px-4 ms-2" onclick="logoutFamily()">
                    <i class="bi bi-box-arrow-left me-1"></i> Logout
                </a>
            </div>
        </div>
    </header>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div id="contactList" class="col-md-7">
                <div class="text-center py-5"><div class="spinner-border text-success"></div></div>
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div class="modal fade" id="addModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow" style="border-radius: 20px;">
                <div class="modal-header border-0">
                    <h5 class="fw-bold">Tambah Kontak Baru</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="contactForm">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Nama Pengurus</label>
                            <input type="text" id="name" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Jabatan/Role</label>
                            <input type="text" id="role" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Nomor WhatsApp/Email</label>
                            <input type="text" id="phone" class="form-control" required>
                        </div>
                        <button type="submit" id="saveBtn" class="btn btn-success w-100 py-3 fw-bold" style="border-radius: 12px;">Simpan Kontak</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        if (window.isAdmin()) {
            document.querySelectorAll('.admin-controls').forEach(el => el.style.display = 'block');
        }

        async function renderData() {
            const data = await DataManager.getAllData(DataManager.TABLES.KONTAK);
            const list = document.getElementById('contactList');
            list.innerHTML = '';

            if (data.length === 0) {
                list.innerHTML = '<p class="text-center text-muted py-5">Belum ada kontak pengurus.</p>';
                return;
            }

            data.forEach(item => {
                list.innerHTML += `
                    <div class="contact-card">
                        <div class="contact-avatar"><i class="bi bi-person-badge"></i></div>
                        <div class="contact-info">
                            <h6 class="fw-bold m-0">${item.name}</h6>
                            <p class="text-muted small m-0">${item.role}</p>
                        </div>
                        <div class="d-flex align-items-center ms-auto">
                            <a href="https://wa.me/${item.phone}" target="_blank" class="btn-call"><i class="bi bi-whatsapp"></i></a>
                            ${window.isAdmin() ? `<i class="bi bi-trash delete-btn" style="display:block" onclick="deleteItem(${item.id})"></i>` : ''}
                        </div>
                    </div>
                `;
            });
        }

        document.getElementById('contactForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Menyimpan...';

            const newItem = {
                name: document.getElementById('name').value,
                role: document.getElementById('role').value,
                phone: document.getElementById('phone').value
            };
            
            await DataManager.addItem(DataManager.TABLES.KONTAK, newItem);
            
            bootstrap.Modal.getInstance(document.getElementById('addModal')).hide();
            saveBtn.disabled = false;
            saveBtn.innerHTML = 'Simpan Kontak';
            this.reset();
            renderData();
        });

        window.deleteItem = async function(id) {
            if (confirm('Hapus kontak ini secara permanen?')) {
                await DataManager.deleteItem(DataManager.TABLES.KONTAK, id);
                renderData();
            }
        }

        renderData();
    </script>
</body>
</html>
