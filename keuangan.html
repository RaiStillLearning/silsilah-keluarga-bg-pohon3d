<!DOCTYPE html>
<html lang="en">
<head>
    <script src="security.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="data_manager.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Keuangan - Keluarga Besar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --primary-color: #1b5e20; }
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; color: #333; }
        .hero-section { 
            background: linear-gradient(rgba(27, 94, 32, 0.85), rgba(46, 125, 50, 0.9)), url('/assets/login-bg.jpg'); 
            background-size: cover; background-position: center;
            color: white; padding: 70px 0; margin-bottom: 40px;
        }
        .card-stat { 
            border: none; border-radius: 24px; padding: 25px;
            background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.04);
        }
        .table-container { 
            background: white; border-radius: 24px; padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.03);
        }
        .badge-income { background: rgba(46, 125, 50, 0.1); color: #2e7d32; border-radius: 8px; padding: 6px 12px; }
        .badge-expense { background: rgba(211, 47, 47, 0.1); color: #d32f2f; border-radius: 8px; padding: 6px 12px; }
        .admin-controls { display: none; }
    </style>
</head>
<body>
    <header class="hero-section text-center">
        <div class="container">
            <h1 class="display-5 fw-bold mb-2">💰 Keuangan Keluarga</h1>
            <p class="lead opacity-75">Transparansi dana untuk kesejahteraan bersama</p>
            <div class="d-flex justify-content-center gap-2 mt-4">
                <a href="/" class="btn btn-outline-light rounded-pill px-4">← Beranda</a>
                <button id="addBtn" class="btn btn-light rounded-pill px-4 admin-controls" data-bs-toggle="modal" data-bs-target="#addModal">
                    <i class="bi bi-plus-lg me-1"></i> Tambah Transaksi
                </button>
                <a href="#" class="btn btn-outline-danger rounded-pill px-4 ms-2" onclick="logoutFamily()">
                    <i class="bi bi-box-arrow-left me-1"></i> Logout
                </a>
            </div>
        </div>
    </header>

    <main class="container mb-5">
        <div class="row g-4 mb-5">
            <div class="col-md-4">
                <div class="card-stat">
                    <div class="small text-muted mb-1">Saldo Kas Utama</div>
                    <h2 id="totalSaldo" class="fw-bold m-0">Rp 0</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card-stat text-success">
                    <div class="small text-muted mb-1 text-success">Total Pemasukan</div>
                    <h2 id="totalMasuk" class="fw-bold m-0">Rp 0</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card-stat text-danger">
                    <div class="small text-muted mb-1 text-danger">Total Pengeluaran</div>
                    <h2 id="totalKeluar" class="fw-bold m-0">Rp 0</h2>
                </div>
            </div>
        </div>

        <div class="table-container">
            <h4 class="fw-bold mb-4">Riwayat Transaksi</h4>
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                        <tr>
                            <th>Tanggal</th>
                            <th>Keterangan</th>
                            <th>Status</th>
                            <th class="text-end">Jumlah</th>
                            <th class="admin-controls"></th>
                        </tr>
                    </thead>
                    <tbody id="keuanganList">
                        <tr><td colspan="5" class="text-center py-4"><div class="spinner-border text-success"></div></td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div class="modal fade" id="addModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow" style="border-radius: 20px;">
                <div class="modal-header border-0">
                    <h5 class="fw-bold">Tambah Transaksi</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="keuanganForm">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Keterangan</label>
                            <input type="text" id="desc" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Tanggal</label>
                            <input type="date" id="date" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Jumlah (Rp)</label>
                            <input type="number" id="amount" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Tipe</label>
                            <select id="type" class="form-select">
                                <option value="masuk">Masuk</option>
                                <option value="keluar">Keluar</option>
                            </select>
                        </div>
                        <button type="submit" id="saveBtn" class="btn btn-success w-100 py-3 fw-bold" style="border-radius: 12px;">Simpan Transaksi</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        if (window.isAdmin()) {
            document.querySelectorAll('.admin-controls').forEach(el => el.style.display = 'block');
        }

        function formatIDR(num) {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(num);
        }

        async function renderData() {
            const data = await DataManager.getAllData(DataManager.TABLES.KEUANGAN);
            const list = document.getElementById('keuanganList');
            let totalMasuk = 0, totalKeluar = 0;

            list.innerHTML = '';
            
            if (data.length === 0) {
                list.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-muted">Belum ada transaksi.</td></tr>';
            }

            data.forEach(item => {
                const amount = parseInt(item.amount);
                if (item.type === 'masuk') totalMasuk += amount;
                else totalKeluar += amount;

                list.innerHTML += `
                    <tr>
                        <td class="text-muted small">${item.date}</td>
                        <td class="fw-semibold">${item.description || item.desc}</td>
                        <td><span class="${item.type === 'masuk' ? 'badge-income' : 'badge-expense'} fw-bold small">${item.type.toUpperCase()}</span></td>
                        <td class="text-end ${item.type === 'masuk' ? 'text-success' : 'text-danger'} fw-bold">
                            ${item.type === 'masuk' ? '+' : '-'} ${formatIDR(amount)}
                        </td>
                        <td class="admin-controls text-end">
                            <i class="bi bi-trash text-danger" style="cursor:pointer" onclick="deleteItem(${item.id})"></i>
                        </td>
                    </tr>
                `;
            });

            document.getElementById('totalMasuk').innerText = formatIDR(totalMasuk);
            document.getElementById('totalKeluar').innerText = formatIDR(totalKeluar);
            document.getElementById('totalSaldo').innerText = formatIDR(totalMasuk - totalKeluar);
            
            if (!window.isAdmin()) {
                document.querySelectorAll('.admin-controls').forEach(el => el.style.display = 'none');
            }
        }

        document.getElementById('keuanganForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Menyimpan...';

            const newItem = {
                desc: document.getElementById('desc').value,
                date: document.getElementById('date').value,
                amount: document.getElementById('amount').value,
                type: document.getElementById('type').value
            };
            
            await DataManager.addItem(DataManager.TABLES.KEUANGAN, newItem);
            
            bootstrap.Modal.getInstance(document.getElementById('addModal')).hide();
            saveBtn.disabled = false;
            saveBtn.innerHTML = 'Simpan Transaksi';
            this.reset();
            renderData();
        });

        window.deleteItem = async function(id) {
            if (confirm('Hapus transaksi ini secara permanen?')) {
                await DataManager.deleteItem(DataManager.TABLES.KEUANGAN, id);
                renderData();
            }
        }

        renderData();
    </script>
</body>
</html>
