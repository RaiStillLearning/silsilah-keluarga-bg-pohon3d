<!doctype html>
<html lang="en">
  <head>
    <script src="security.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Keluarga Besar Silsilah</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <style>
      :root {
        --primary-color: #2e7d32;
      }
      body {
        font-family: "Inter", sans-serif;
        margin: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        background-color: #1a1a1a;
      }
      .bg-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url("/assets/login-bg.jpg");
        background-size: cover;
        background-position: center;
        filter: brightness(0.9);
        z-index: -1;
      }
      .bg-gradient-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          135deg,
          rgba(0, 0, 0, 0.7) 0%,
          rgba(46, 125, 50, 0.4) 100%
        );
        z-index: -1;
      }
      .login-card {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(15px);
        border-radius: 24px;
        padding: 40px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.2);
        position: relative;
      }
      .login-header {
        text-align: center;
        margin-bottom: 30px;
      }
      .logo-circle {
        width: 70px;
        height: 70px;
        background: var(--primary-color);
        color: white;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        margin: 0 auto 15px;
        box-shadow: 0 10px 20px rgba(46, 125, 50, 0.3);
      }
      .form-control {
        border-radius: 12px;
        padding: 12px 15px;
        border: 1px solid #ddd;
        background: rgba(255, 255, 255, 0.8);
      }
      .form-control:focus {
        box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.2);
        border-color: var(--primary-color);
      }
      .btn-login {
        background: var(--primary-color);
        border: none;
        border-radius: 12px;
        padding: 12px;
        font-weight: 600;
        transition: all 0.3s;
        color: white;
      }
      .btn-login:hover {
        background: #1b5e20;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        color: white;
      }
      .input-group-text {
        background: transparent;
        border-right: none;
        border-radius: 12px 0 0 12px;
        color: #666;
      }
      .form-control {
        border-left: none;
      }
      .alert-custom {
        border-radius: 12px;
        display: none;
        font-size: 14px;
        margin-top: 15px;
      }
      .footer-text {
        text-align: center;
        margin-top: 30px;
        font-size: 12px;
        color: #666;
      }

      #entryOverlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: white;
        z-index: 9999;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
      }
      .loader-bar-container {
        width: 250px;
        height: 6px;
        background: #eee;
        border-radius: 3px;
        overflow: hidden;
        margin-top: 20px;
      }
      .loader-progress {
        width: 0%;
        height: 100%;
        background: var(--primary-color);
        transition: width 2s cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* OTP Styles */
      .otp-inputs input {
        width: 45px;
        height: 55px;
        font-size: 24px;
        font-weight: bold;
        border-radius: 10px;
        border: 2px solid #ddd;
        text-align: center;
      }
      .otp-inputs input:focus {
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.2);
        outline: none;
      }
    </style>
  </head>
  <body>
    <div class="bg-overlay"></div>
    <div class="bg-gradient-overlay"></div>

    <div
      class="container d-flex align-items-center justify-content-center"
      style="height: 100vh"
    >
      <div id="entryOverlay">
        <div class="logo-circle">
          <i class="bi bi-tree-fill"></i>
        </div>
        <h4 class="fw-bold mt-3">Membuka Gerbang Keluarga...</h4>
        <p class="text-muted">Mempersiapkan visualisasi pohon 3D</p>
        <div class="loader-bar-container">
          <div class="loader-progress" id="loaderProgress"></div>
        </div>
      </div>

      <div class="login-card">
        <div class="login-header">
          <div class="logo-circle">
            <i class="bi bi-tree-fill"></i>
          </div>
          <h3 class="fw-bold">Selamat Datang</h3>
          <p class="text-muted small" id="loginSub">Akses Khusus Keluarga Besar</p>
        </div>

        <form id="loginForm">
          <div id="passwordSection">
            <div class="mb-3">
              <label class="form-label">Email Keluarga</label>
              <div class="input-group">
                <span class="input-group-text"
                  ><i class="bi bi-envelope"></i
                ></span>
                <input type="email" id="username" class="form-control" required />
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label">Kata Sandi</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input
                  type="password"
                  id="password"
                  class="form-control"
                  required
                />
                <button
                  class="btn btn-outline-secondary"
                  type="button"
                  id="togglePassword"
                  style="border-radius: 0 12px 12px 0; border-left: none"
                >
                  <i class="bi bi-eye"></i>
                </button>
              </div>
            </div>

            <button
              type="submit"
              class="btn btn-success btn-login w-100"
              id="loginBtn"
            >
              <span
                class="spinner-border spinner-border-sm"
                id="loginSpinner"
                style="display: none"
                role="status"
              ></span>
              Masuk Sekarang
            </button>
          </div>

          <div id="otpSection" style="display: none;">
            <p class="text-center text-muted small mb-3">Masukkan 6 digit kode yang dikirim ke email Anda</p>
            <div class="otp-inputs d-flex gap-2 justify-content-center mb-4">
              <input type="text" maxlength="1" class="otp-input" />
              <input type="text" maxlength="1" class="otp-input" />
              <input type="text" maxlength="1" class="otp-input" />
              <input type="text" maxlength="1" class="otp-input" />
              <input type="text" maxlength="1" class="otp-input" />
              <input type="text" maxlength="1" class="otp-input" />
            </div>
            <button type="button" class="btn btn-success w-100 mb-3" id="verifyOtpBtn">
              <span class="spinner-border spinner-border-sm" id="otpSpinner" style="display: none"></span>
              Verifikasi & Masuk
            </button>
            <div class="text-center">
              <a href="#" id="backToLogin" class="small text-muted text-decoration-none">← Kembali ke Login</a>
            </div>
          </div>

          <div class="alert alert-danger alert-custom" id="errorAlert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i> <span id="errorMsg">Username atau password salah.</span>
          </div>
        </form>

        <div class="footer-text">
          &copy; 2026 Silsilah Keluarga Besar. Semua hak dilindungi.
          <br><a href="/register" style="color: #2e7d32; font-weight: 600; text-decoration: none;">Belum punya akun? Daftar di sini</a>
        </div>
      </div>
    </div>

    <script src="security.js"></script>
    <script>
      const loginForm = document.getElementById("loginForm");
      const loginBtn = document.getElementById("loginBtn");
      const loginSpinner = document.getElementById("loginSpinner");
      const errorAlert = document.getElementById("errorAlert");
      const errorMsg = document.getElementById("errorMsg");
      const togglePassword = document.getElementById("togglePassword");
      const passwordInput = document.getElementById("password");

      const passwordSection = document.getElementById("passwordSection");
      const otpSection = document.getElementById("otpSection");
      const loginSub = document.getElementById("loginSub");
      const verifyOtpBtn = document.getElementById("verifyOtpBtn");
      const otpSpinner = document.getElementById("otpSpinner");
      const backToLogin = document.getElementById("backToLogin");
      const otpInputs = document.querySelectorAll(".otp-input");

      let currentEmail = "";

      togglePassword.addEventListener("click", function () {
        const type =
          passwordInput.getAttribute("type") === "password"
            ? "text"
            : "password";
        passwordInput.setAttribute("type", type);
        this.querySelector("i").classList.toggle("bi-eye");
        this.querySelector("i").classList.toggle("bi-eye-slash");
      });

      // OTP Input Handling
      otpInputs.forEach((input, index) => {
        input.addEventListener("input", (e) => {
          if (e.target.value.length === 1 && index < otpInputs.length - 1) {
            otpInputs[index + 1].focus();
          }
        });
        input.addEventListener("keydown", (e) => {
          if (e.key === "Backspace" && e.target.value === "" && index > 0) {
            otpInputs[index - 1].focus();
          }
        });
      });

      backToLogin.addEventListener("click", (e) => {
        e.preventDefault();
        otpSection.style.display = "none";
        passwordSection.style.display = "block";
        loginSub.textContent = "Akses Khusus Keluarga Besar";
        errorAlert.style.display = "none";
      });

      loginForm.addEventListener("submit", async function (e) {
        e.preventDefault();

        const username = document.getElementById("username").value;
        const password = passwordInput.value;
        currentEmail = username;

        errorAlert.style.display = "none";
        loginBtn.disabled = true;
        loginSpinner.style.display = "inline-block";

        setTimeout(async () => {
          const success = await window.verifyFamilyLogin(
            username,
            password,
            true, // skip redirect
          );

          if (success) {
            // Password correct, now request OTP
            const otpRequest = await window.requestLoginOTP(username);
            if (otpRequest.success) {
              passwordSection.style.display = "none";
              otpSection.style.display = "block";
              loginSub.textContent = "Verifikasi Kode OTP";
              otpInputs[0].focus();
            } else {
              errorMsg.textContent = otpRequest.message;
              errorAlert.style.display = "block";
              loginBtn.disabled = false;
              loginSpinner.style.display = "none";
            }
          } else {
            loginSpinner.style.display = "none";
            loginBtn.disabled = false;
            errorMsg.textContent = "Email atau password salah.";
            errorAlert.style.display = "block";
            document
              .querySelector(".login-card")
              .animate(
                [
                  { transform: "translateX(0)" },
                  { transform: "translateX(-10px)" },
                  { transform: "translateX(10px)" },
                  { transform: "translateX(0)" },
                ],
                { duration: 300, iterations: 2 },
              );
          }
        }, 800);
      });

      verifyOtpBtn.addEventListener("click", async () => {
        const otp = Array.from(otpInputs).map(i => i.value).join("");
        if (otp.length !== 6) return;

        errorAlert.style.display = "none";
        verifyOtpBtn.disabled = true;
        otpSpinner.style.display = "inline-block";

        const result = await window.verifyLoginOTP(currentEmail, otp);
        if (result.success) {
          document.getElementById("entryOverlay").style.display = "flex";
          setTimeout(() => {
            document.getElementById("loaderProgress").style.width = "100%";
          }, 50);

          setTimeout(() => {
            let target = localStorage.getItem("redirect_after_login") || "/home";
            target = target.replace(".html", "");
            window.location.href = target;
            localStorage.removeItem("redirect_after_login");
          }, 2200);
        } else {
          otpSpinner.style.display = "none";
          verifyOtpBtn.disabled = false;
          errorMsg.textContent = result.message;
          errorAlert.style.display = "block";
        }
      });
    </script>
  </body>
</html>
