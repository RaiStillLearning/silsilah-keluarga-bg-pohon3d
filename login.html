<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Keluarga Besar Silsilah</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: #2e7d32;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('assets/login-bg.jpg');
            background-size: cover;
            background-position: center;
            filter: brightness(0.9);
            z-index: -1;
            transition: transform 10s ease-in-out;
        }

        body:hover .bg-image {
            transform: scale(1.05);
        }

        .login-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.4) 100%);
        }

        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: fadeInScale 0.8s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-circle {
            width: 70px;
            height: 70px;
            background: var(--primary-color);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 15px;
            box-shadow: 0 10px 20px rgba(46, 125, 50, 0.3);
        }

        .form-label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #333;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px 15px;
            border: 1px solid #ddd;
            background: rgba(255, 255, 255, 0.5);
            transition: all 0.3s;
        }

        .form-control:focus {
            box-shadow: 0 0 0 4px rgba(46, 125, 50, 0.15);
            border-color: var(--primary-color);
            background: white;
        }

        .btn-login {
            background: var(--primary-color);
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: #1b5e20;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(27, 94, 32, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .input-group-text {
            background: transparent;
            border-radius: 12px 0 0 12px;
            border-right: none;
            color: #666;
        }

        .input-group .form-control {
            border-left: none;
            border-radius: 0 12px 12px 0;
        }

        .alert-custom {
            border-radius: 12px;
            display: none;
            font-size: 0.85rem;
            margin-top: 15px;
        }

        .footer-text {
            text-align: center;
            margin-top: 25px;
            font-size: 0.85rem;
            color: #555;
        }

        /* Loading Spinner */
        .spinner-border-sm {
            display: none;
            margin-right: 8px;
        }

        /* Entry Transition Overlay */
        #entryOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            z-index: 9999;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .loader-bar-container {
            width: 250px;
            height: 4px;
            background: #eee;
            border-radius: 10px;
            margin-top: 20px;
            overflow: hidden;
        }

        .loader-progress {
            width: 0%;
            height: 100%;
            background: var(--primary-color);
            transition: width 2s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body>
    <div class="bg-image"></div>

    <div class="login-container">
        <div id="entryOverlay">
            <div class="logo-circle">
                <i class="bi bi-tree-fill"></i>
            </div>
            <h4 class="fw-bold mt-3">Membuka Gerbang Keluarga...</h4>
            <p class="text-muted">Mempersiapkan visualisasi pohon 3D</p>
            <div class="loader-bar-container">
                <div class="loader-progress" id="loaderProgress"></div>
            </div>
        </div>

        <div class="login-card">
            <div class="login-header">
                <div class="logo-circle">
                    <i class="bi bi-tree-fill"></i>
                </div>
                <h3 class="fw-bold">Selamat Datang</h3>
                <p class="text-muted small">Akses Khusus Keluarga Besar</p>
            </div>

            <form id="loginForm" onsubmit="return false;">
                <div class="mb-3">
                    <label class="form-label">Email Keluarga</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" id="username" class="form-control" placeholder="keluarga@gmail.com" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Kata Sandi</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                        <button class="btn btn-outline-secondary" type="button" id="togglePassword" style="border-radius: 0 12px 12px 0; border-left: none;">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-success btn-login w-100" id="loginBtn">
                    <span class="spinner-border spinner-border-sm" id="loginSpinner" role="status"></span>
                    Masuk Sekarang
                </button>

                <div class="alert alert-danger alert-custom" id="errorAlert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i> Username atau password salah.
                </div>
            </form>

            <div class="footer-text">
                &copy; 2026 Silsilah Keluarga Rusli. Semua hak dilindungi.
            </div>
        </div>
    </div>

    <script src="security.js"></script>
    <script>
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const loginSpinner = document.getElementById('loginSpinner');
        const errorAlert = document.getElementById('errorAlert');
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        // Toggle Password Visibility
        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.querySelector('i').classList.toggle('bi-eye');
            this.querySelector('i').classList.toggle('bi-eye-slash');
        });

        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = passwordInput.value;

            // Reset UI
            errorAlert.style.display = 'none';
            loginBtn.disabled = true;
            loginSpinner.style.display = 'inline-block';

            // Simulate small delay for premium feel
            setTimeout(async () => {
                const success = await window.verifyFamilyLogin(username, password, true); // Added 'true' to skip immediate redirect
                
                if (success) {
                    // Success Transition
                    document.getElementById('entryOverlay').style.display = 'flex';
                    setTimeout(() => {
                        document.getElementById('loaderProgress').style.width = '100%';
                    }, 50);

                    // Final Redirect after progress bar fills
                    setTimeout(() => {
                        window.location.href = localStorage.getItem("redirect_after_login") || "/home";
                        localStorage.removeItem("redirect_after_login");
                    }, 2200);
                } else {
                    loginSpinner.style.display = 'none';
                    loginBtn.disabled = false;
                    errorAlert.style.display = 'block';
                    // Shake effect
                    document.querySelector('.login-card').animate([
                        { transform: 'translateX(0)' },
                        { transform: 'translateX(-10px)' },
                        { transform: 'translateX(10px)' },
                        { transform: 'translateX(0)' }
                    ], { duration: 300 });
                }
            }, 800);
        });
    </script>
</body>
</html>
