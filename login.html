<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Keluarga Besar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: #f8f9fa;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            max-width: 400px;
            width: 100%;
            padding: 30px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
        }
        .icon {
            font-size: 40px;
            margin-bottom: 20px;
        }
        .btn-success {
            background: #2e7d32;
            border: none;
            padding: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="icon">🌳</div>
        <h4 class="fw-bold mb-3">Akses Terbatas</h4>
        <p class="text-muted mb-4">Silakan masukkan kata sandi keluarga untuk melanjutkan.</p>
        
        <div class="mb-3 text-start">
            <label class="form-label small fw-bold">Kata Sandi</label>
            <input type="password" id="passwordInput" class="form-control" placeholder="Masukkan sandi...">
            <div id="errorMsg" class="text-danger small mt-2" style="display: none;">Kata sandi salah!</div>
        </div>
        
        <button class="btn btn-success w-100" onclick="handleLogin()">Masuk</button>
        <a href="index.html" class="btn btn-link w-100 mt-3 text-muted text-decoration-none small">← Kembali ke Pohon</a>
    </div>

    <script>
        // Override the auto-redirect in security.js if we are on login.html
        window.isLoginPage = true;
        
        function handleLogin() {
            const input = document.getElementById('passwordInput').value;
            const error = document.getElementById('errorMsg');
            
            // The function from security.js
            if (window.verifyFamilyPassword(input)) {
                // Success handled in security.js
            } else {
                error.style.display = 'block';
            }
        }

        document.getElementById('passwordInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') handleLogin();
        });
    </script>
    <script src="security.js"></script>
    <script>
        // Clean up: security.js might have redirected us here, but we are ALREADY here.
        // We need to prevent the checkAuth from running or ignore it on login.html
    </script>
</body>
</html>
