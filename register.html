<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daftar Akun - Keluarga Besar Silsilah</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
    <style>
      :root { --primary-color: #2e7d32; }
      body {
        font-family: "Inter", sans-serif;
        margin: 0; min-height: 100vh;
        display: flex; align-items: center; justify-content: center;
        overflow-y: auto; background-color: #1a1a1a;
      }
      .bg-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background-image: url("/assets/login-bg.jpg");
        background-size: cover; background-position: center;
        filter: brightness(0.9); z-index: -2;
      }
      .bg-gradient-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(135deg, rgba(0,0,0,0.7) 0%, rgba(46,125,50,0.4) 100%);
        z-index: -1;
      }
      .register-card {
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(15px);
        border-radius: 24px; padding: 36px;
        width: 100%; max-width: 440px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        border: 1px solid rgba(255,255,255,0.2);
        margin: 20px;
      }
      .login-header { text-align: center; margin-bottom: 24px; }
      .logo-circle {
        width: 60px; height: 60px;
        background: var(--primary-color); color: white;
        border-radius: 50%; display: flex;
        align-items: center; justify-content: center;
        font-size: 28px; margin: 0 auto 12px;
        box-shadow: 0 10px 20px rgba(46,125,50,0.3);
      }
      .form-control {
        border-radius: 12px; padding: 11px 14px;
        border: 1px solid #ddd; background: rgba(255,255,255,0.8);
      }
      .form-control:focus {
        box-shadow: 0 0 0 3px rgba(46,125,50,0.2);
        border-color: var(--primary-color);
      }
      .input-group-text {
        background: transparent; border-right: none;
        border-radius: 12px 0 0 12px; color: #666;
      }
      .input-group .form-control { border-left: none; }
      .btn-register {
        background: var(--primary-color); border: none;
        border-radius: 12px; padding: 12px;
        font-weight: 600; transition: all 0.3s; color: white;
      }
      .btn-register:hover {
        background: #1b5e20; transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0,0,0,0.2); color: white;
      }
      .btn-register:disabled {
        background: #aaa; transform: none;
        box-shadow: none; cursor: not-allowed;
      }
      .password-rules { font-size: 12px; margin-top: 8px; }
      .password-rules .rule {
        display: flex; align-items: center; gap: 6px;
        padding: 2px 0; color: #999; transition: color 0.3s;
      }
      .password-rules .rule.passed { color: #2e7d32; font-weight: 600; }
      .password-rules .rule i { font-size: 14px; }
      .strength-bar {
        height: 4px; border-radius: 2px;
        background: #eee; margin-top: 8px; overflow: hidden;
      }
      .strength-fill {
        height: 100%; border-radius: 2px;
        transition: width 0.3s, background 0.3s; width: 0%;
      }
      .alert-custom {
        border-radius: 12px; display: none;
        font-size: 13px; margin-top: 12px;
      }
      .footer-text {
        text-align: center; margin-top: 20px;
        font-size: 12px; color: #666;
      }
      .footer-text a { color: var(--primary-color); font-weight: 600; text-decoration: none; }
      .footer-text a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div class="bg-overlay"></div>
    <div class="bg-gradient-overlay"></div>

    <div class="register-card">
      <div class="login-header">
        <div class="logo-circle"><i class="bi bi-person-plus-fill"></i></div>
        <h3 class="fw-bold">Daftar Akun</h3>
        <p class="text-muted small">Buat akun untuk mengakses silsilah keluarga</p>
      </div>

      <form id="registerForm">
        <div class="mb-3">
          <label class="form-label small fw-bold">Nama Lengkap</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" id="fullName" class="form-control" placeholder="Masukkan nama lengkap" required />
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label small fw-bold">Email</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" id="regEmail" class="form-control" placeholder="contoh@email.com" required />
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label small fw-bold">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" id="regPassword" class="form-control" placeholder="Buat password" required />
            <button class="btn btn-outline-secondary" type="button" id="togglePwd" style="border-radius: 0 12px 12px 0; border-left: none;">
              <i class="bi bi-eye"></i>
            </button>
          </div>
          <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
          <div class="password-rules" id="passwordRules">
            <div class="rule" data-rule="minLength"><i class="bi bi-circle"></i> Minimal 8 karakter</div>
            <div class="rule" data-rule="hasUppercase"><i class="bi bi-circle"></i> Huruf besar (A-Z)</div>
            <div class="rule" data-rule="hasLowercase"><i class="bi bi-circle"></i> Huruf kecil (a-z)</div>
            <div class="rule" data-rule="hasNumber"><i class="bi bi-circle"></i> Angka (0-9)</div>
            <div class="rule" data-rule="hasSpecial"><i class="bi bi-circle"></i> Karakter spesial (!@#$%^&*)</div>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label small fw-bold">Konfirmasi Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input type="password" id="confirmPassword" class="form-control" placeholder="Ulangi password" required />
          </div>
          <div id="matchError" style="font-size: 12px; color: #dc3545; margin-top: 4px; display: none;">
            <i class="bi bi-exclamation-circle"></i> Password tidak cocok
          </div>
        </div>

        <button type="submit" class="btn btn-register w-100" id="registerBtn" disabled>
          <span class="spinner-border spinner-border-sm" id="regSpinner" style="display: none" role="status"></span>
          Daftar Sekarang
        </button>

        <div class="alert alert-danger alert-custom" id="errorAlert">
          <i class="bi bi-exclamation-triangle-fill me-2"></i><span id="errorMsg"></span>
        </div>
        <div class="alert alert-success alert-custom" id="successAlert">
          <i class="bi bi-check-circle-fill me-2"></i><span id="successMsg"></span>
        </div>
      </form>

      <div class="footer-text">
        Sudah punya akun? <a href="/login">Masuk di sini</a>
      </div>
    </div>

    <script src="security.js"></script>
    <script>
      const regPassword = document.getElementById('regPassword');
      const confirmPassword = document.getElementById('confirmPassword');
      const strengthFill = document.getElementById('strengthFill');
      const registerBtn = document.getElementById('registerBtn');
      const matchError = document.getElementById('matchError');

      // Toggle password visibility
      document.getElementById('togglePwd').addEventListener('click', function() {
        const type = regPassword.type === 'password' ? 'text' : 'password';
        regPassword.type = type;
        this.querySelector('i').classList.toggle('bi-eye');
        this.querySelector('i').classList.toggle('bi-eye-slash');
      });

      // Live password validation
      regPassword.addEventListener('input', function() {
        const val = this.value;
        const result = window.validatePassword(val);
        
        // Update rule indicators
        document.querySelectorAll('.rule').forEach(el => {
          const rule = el.dataset.rule;
          if (result.rules[rule]) {
            el.classList.add('passed');
            el.querySelector('i').className = 'bi bi-check-circle-fill';
          } else {
            el.classList.remove('passed');
            el.querySelector('i').className = 'bi bi-circle';
          }
        });

        // Update strength bar
        const pct = (result.strength / 5) * 100;
        strengthFill.style.width = pct + '%';
        if (result.strength <= 2) strengthFill.style.background = '#dc3545';
        else if (result.strength <= 3) strengthFill.style.background = '#ffc107';
        else if (result.strength <= 4) strengthFill.style.background = '#198754';
        else strengthFill.style.background = '#2e7d32';

        checkFormReady();
      });

      // Confirm password match
      confirmPassword.addEventListener('input', checkFormReady);

      function checkFormReady() {
        const result = window.validatePassword(regPassword.value);
        const match = regPassword.value === confirmPassword.value && confirmPassword.value.length > 0;
        
        if (confirmPassword.value.length > 0 && !match) {
          matchError.style.display = 'block';
        } else {
          matchError.style.display = 'none';
        }

        registerBtn.disabled = !(result.allPassed && match);
      }

      // Submit registration
      document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const fullName = document.getElementById('fullName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = regPassword.value;

        document.getElementById('errorAlert').style.display = 'none';
        document.getElementById('successAlert').style.display = 'none';
        registerBtn.disabled = true;
        document.getElementById('regSpinner').style.display = 'inline-block';

        const result = await window.registerFamily(fullName, email, password);

        document.getElementById('regSpinner').style.display = 'none';

        if (result.success) {
          document.getElementById('successMsg').textContent = result.message;
          document.getElementById('successAlert').style.display = 'block';
          setTimeout(() => { window.location.href = '/login'; }, 2000);
        } else {
          document.getElementById('errorMsg').textContent = result.message;
          document.getElementById('errorAlert').style.display = 'block';
          registerBtn.disabled = false;
          document.querySelector('.register-card').animate(
            [{ transform: 'translateX(0)' }, { transform: 'translateX(-10px)' },
             { transform: 'translateX(10px)' }, { transform: 'translateX(0)' }],
            { duration: 300, iterations: 2 }
          );
        }
      });
    </script>
  </body>
</html>
